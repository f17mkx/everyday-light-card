<?xml version="1.0" encoding="UTF-8"?>
<!--
  everyday-light-card - 7-dot hexagonal "favorite colors" icon (R9)
  - 1 center dot + 6 hexagonal outer dots
  - Uses currentColor for HA theme integration
  - viewBox 24x24 matches MDI standard
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
  <!-- Center dot -->
  <circle cx="12" cy="12" r="2.5"/>
  <!-- 6 outer dots at hexagonal positions, radius 7 from center -->
  <circle cx="19" cy="12" r="1.8"/>           <!-- 0° (right) -->
  <circle cx="15.5" cy="18.06" r="1.8"/>      <!-- 60° (lower-right) -->
  <circle cx="8.5" cy="18.06" r="1.8"/>       <!-- 120° (lower-left) -->
  <circle cx="5" cy="12" r="1.8"/>            <!-- 180° (left) -->
  <circle cx="8.5" cy="5.94" r="1.8"/>        <!-- 240° (upper-left) -->
  <circle cx="15.5" cy="5.94" r="1.8"/>       <!-- 300° (upper-right) -->
</svg>
